### Iteration 1 "fast" variant of student_sft_distill.yaml.
### Adds Liger Kernel (~+20% throughput, -60% peak VRAM) and the Muon
### optimizer (Newton-Schulz orthogonalization on 2D params, ~52% of
### AdamW FLOPs). Both flags require a CUDA GPU and the optional
### `liger-kernel` package: `pip install liger-kernel`.
###
### To run:
###     python -m llamafactory.cli train examples/distillation/student_sft_distill_fast.yaml
###
### To revert to the standard path, use student_sft_distill.yaml.

### model
model_name_or_path: Qwen/Qwen2.5-Coder-14B-Instruct
trust_remote_code: true
enable_liger_kernel: true   # Liger fused Triton kernels (RMSNorm/RoPE/SwiGLU/FLCE)

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_target: all
use_muon: true              # Muon for 2D params, AdamW auto-routed for 1D/embed/head

### dataset
# Input: consensus_sft.jsonl produced by purify_teacher_outputs.py
# from multi-teacher responses (multi_teacher_generate.py).
# Format: {"instruction": "...", "output": "..."}
# For single-teacher: use teacher-trace dataset directly.
dataset_dir: data
dataset: distill_python_rust_train
template: qwen
cutoff_len: 8192
max_samples: 200000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen2.5-coder-14b/lora/distill_sft_fast
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000

### eval
val_size: 0.01
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500
