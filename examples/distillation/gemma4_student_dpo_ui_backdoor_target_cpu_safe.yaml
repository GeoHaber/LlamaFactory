### CPU-safe target-profile DPO run for machines without bf16/GPU support.

### model
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
adapter_name_or_path: saves/gemma4_student/lora/sft_target_cpu_safe
trust_remote_code: true

### method
stage: dpo
do_train: true
finetuning_type: lora
lora_rank: 16
lora_target: all

### dataset
dataset_dir: data
dataset: distill_ocr_chat_translate_4lang_pref
template: qwen
cutoff_len: 1024
max_samples: 48
preprocessing_num_workers: 1
dataloader_num_workers: 0

### output
output_dir: saves/gemma4_student/lora/dpo_target_cpu_safe
logging_steps: 5
save_steps: 50
plot_loss: false
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: false
fp16: false
pref_beta: 0.1
pref_loss: sigmoid

### eval
val_size: 0.0
