### model
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_target: all

### dataset
dataset_dir: data
dataset: distill_ocr_chat_translate_4lang_train
template: qwen
cutoff_len: 2048
max_samples: 200000
preprocessing_num_workers: 4
dataloader_num_workers: 4

### output
output_dir: saves/gemma4_student/lora/sft
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: false
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 2.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
fp16: false

### eval
val_size: 0.01
