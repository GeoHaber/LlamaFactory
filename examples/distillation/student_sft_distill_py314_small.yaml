### model
model_name_or_path: distilgpt2
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset_dir: data
dataset: distill_python_rust_train
template: default
cutoff_len: 512
max_samples: 64
preprocessing_num_workers: 1
dataloader_num_workers: 0

### output
output_dir: saves/py314_small/lora/distill_sft
logging_steps: 1
save_steps: 20
plot_loss: false
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 2.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: false
fp16: false

### eval
val_size: 0.0
