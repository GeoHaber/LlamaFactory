### Iteration 1 "fast" variant of gemma4_student_sft_ui_backdoor_template.yaml.
### Adds Liger Kernel + Muon optimizer for the small Qwen2.5-1.5B student.
### Requires CUDA + `pip install liger-kernel`.
### Use the non-fast template for CPU smoke runs.

### model
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
trust_remote_code: true
enable_liger_kernel: true   # Liger fused Triton kernels for qwen2 architecture

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_target: all
use_muon: true              # Muon for 2D params, AdamW auto-routed for 1D/embed/head

### dataset
dataset_dir: data
dataset: distill_ocr_chat_translate_4lang_train
template: qwen
cutoff_len: 2048
max_samples: 200000
preprocessing_num_workers: 4
dataloader_num_workers: 4

### output
output_dir: saves/gemma4_student/lora/sft_fast
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: false
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 2.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
fp16: false

### eval
val_size: 0.01
