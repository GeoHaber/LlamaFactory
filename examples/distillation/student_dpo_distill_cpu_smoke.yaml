### model
model_name_or_path: sshleifer/tiny-gpt2
trust_remote_code: true

### method
stage: dpo
do_train: true
finetuning_type: lora
lora_rank: 4
lora_target: all

### dataset
dataset_dir: data
dataset: distill_python_rust_pref
template: default
cutoff_len: 256
max_samples: 2
preprocessing_num_workers: 1
dataloader_num_workers: 0

### output
output_dir: saves/smoke/distill_dpo
logging_steps: 1
save_steps: 10
plot_loss: false
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-5
num_train_epochs: 0.01
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: false
fp16: false
pref_beta: 0.1
pref_loss: sigmoid

### eval
val_size: 0.0
